kind = "web"
previewPath = "/"
title = "Conquista Galáctica"
version = "1.0.0"
id = "artifacts/conquista-galactica"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18237

[services.development]
run = "pnpm --filter @workspace/conquista-galactica run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/conquista-galactica", "run", "build" ]
publicDir = "artifacts/conquista-galactica/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18237"
BASE_PATH = "/"
